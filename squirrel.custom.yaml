patch:
    style/color_scheme: custom_mojave_light
    style/color_scheme_dark: custom_mojave_dark

    style/candidate_list_layout: linear # stacked 纵向； linear 横向
    style/text_orientation: horizontal

    style/status_message_type: mix
    style/candidate_format: '[label]. [candidate] [comment]'

    style/font_point: 15
    style/font_face: Avenir-Book
    style/label_font_point: 13
    style/comment_font_point: 13
    style/translucency: true
    style/mutual_exclusive: false
    style/memorize_size: true
    style/alpha: 9e-1
    style/line_spacing: 5e+0
    style/spacing: 8e+0

    preset_color_schemes/+:
        macos_light:
            back_color: 0xFFFFFF # 候选条背景色，24位色值，16进制，BGR顺序
            border_color: 0xFFFFFF # 边框色
            text_color: 0x424242 # 拼音行文字颜色
            hilited_back_color: 0xD75A00 # 第一候选项背景背景色
            hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
            hilited_candidate_label_color: 0xFFFFFF # 第一候选项编号颜色
            hilited_comment_text_color: 0x999999 # 注解文字高亮
            hilited_text_color: 0x999999 # 高亮拼音 (需要开启内嵌编码)
            candidate_text_color: 0x3c3c3c # 预选项文字颜色
            comment_text_color: 0x999999 # 拼音等提示文字颜色
            label_color: 0x666666 # 预选栏编号颜色
            corner_radius: 5 # 候选条圆角
            hilited_corner_radius: 5 # 高亮圆角
            border_height: 4 # 窗口上下高度
            border_width: 4 # 窗口左右宽度
            border_color_width: 0 # 输入条边框宽度

        macos_dark:
            back_color: 0x222222 # 候选条背景色，24位色值，16进制，BGR顺序
            border_color: 0x222222 # 边框色
            text_color: 0x424242 # 拼音行文字颜色
            hilited_back_color: 0xD75A00 # 第一候选项背景背景色
            hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
            hilited_candidate_label_color: 0xFFFFFF # 第一候选项编号颜色
            hilited_comment_text_color: 0x999999 # 注解文字高亮
            hilited_text_color: 0x999999 # 高亮拼音 (需要开启内嵌编码)
            candidate_text_color: 0xe9e9ea # 预选项文字颜色
            comment_text_color: 0x999999 # 拼音等提示文字颜色
            label_color: 0x999999 # 预选栏编号颜色
            corner_radius: 5 # 候选条圆角
            hilited_corner_radius: 5 # 高亮圆角
            border_height: 4 # 窗口上下高度
            border_width: 4 # 窗口左右宽度
            border_color_width: 0 # 输入条边框宽度

        win10_light:
            corner_radius: 6
            back_color: 0xFFFFFF # 候选条背景色，24位色值，16进制，BGR顺序
            border_color: 0xFFFFFF # 边框色
            text_color: 0x424242 # 拼音行文字颜色
            hilited_back_color: 0xD75A00 # 第一候选项背景背景色
            hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
            hilited_candidate_label_color: 0xFFFFFF # 第一候选项编号颜色
            hilited_comment_text_color: 0x999999 # 注解文字高亮
            hilited_text_color: 0x999999 # 高亮拼音 (需要开启内嵌编码)
            candidate_text_color: 0x3c3c3c # 预选项文字颜色
            comment_text_color: 0x999999 # 拼音等提示文字颜色
            label_color: 0x666666 # 预选栏编号颜色

        win10_dark:
            corner_radius: 6
            back_color: 0x222222 # 候选条背景色，24位色值，16进制，BGR顺序
            border_color: 0x222222 # 边框色
            text_color: 0x424242 # 拼音行文字颜色
            hilited_back_color: 0xD75A00 # 第一候选项背景背景色
            hilited_candidate_text_color: 0xFFFFFF # 第一候选项文字颜色
            hilited_candidate_label_color: 0xFFFFFF # 第一候选项编号颜色
            hilited_comment_text_color: 0x999999 # 注解文字高亮
            hilited_text_color: 0x999999 # 高亮拼音 (需要开启内嵌编码)
            candidate_text_color: 0xe9e9ea # 预选项文字颜色
            comment_text_color: 0x999999 # 拼音等提示文字颜色
            label_color: 0xaaaaaa # 预选栏编号颜色

        custom_mojave_light:
            name: Custom Mojave Light
            color_space: srgb
            back_color: '0xFFFFFF'
            hilited_back_color: '0xFFFFFF'
            hilited_candidate_back_color: '0xCE7539'
            text_color: '0x666666'
            hilited_text_color: '0x000000'
            candidate_text_color: '0x000000'
            hilited_candidate_text_color: '0xFFFFFF'
            label_color: '0x888785'
            hilited_candidate_label_color: '0xFFFFFF'
            comment_text_color: '0x6D6D6D'
            hilited_comment_text_color: '0xEBC6B0'
            corner_radius: 9e+0
            hilited_corner_radius: 8e+0
            border_height: -5e+0
            border_width: 0e+0

        custom_mojave_dark:
            name: Custom Mojave Dark
            color_space: srgb
            back_color: '0x252320'
            hilited_back_color: '0x252320'
            hilited_candidate_back_color: '0xCB5D00'
            text_color: '0xDEDDDD'
            hilited_text_color: '0xDEDDDD'
            candidate_text_color: '0xDEDDDD'
            hilited_candidate_text_color: '0xFFFFFF'
            label_color: '0x888785'
            hilited_candidate_label_color: '0xFFFFFF'
            comment_text_color: '0x6D6D6D'
            hilited_comment_text_color: '0xEBC6B0'
            corner_radius: 9e+0
            hilited_corner_radius: 8e+0
            border_height: -3e+0
            border_width: 0e+0
